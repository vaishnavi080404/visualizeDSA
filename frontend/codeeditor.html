<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Playground — CODEANIME</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-ocean.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/nord.min.css"
    />
    <style>
      :root {
        --primary-green: #10b981;
        --primary-cyan: #06b6d4;
        --primary-purple: #8b5cf6;
        --primary-orange: #f59e0b;
        --primary-red: #ef4444;
        --dark-bg: #0a0a0a;
        --card-bg: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --border-color: #2a2a2a;
        --nav-bg: rgba(10, 10, 10, 0.95);
        --code-bg: #0d1117;
        --terminal-bg: #0d1117;
        --input-color: #f0f6fc;
      }
      [data-theme="light"] {
        --dark-bg: #f0f4f8;
        --card-bg: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border-color: #d1d9e0;
        --nav-bg: rgba(240, 244, 248, 0.95);
        --code-bg: #f6f8fa;
        --terminal-bg: #f6f8fa;
        --input-color: #0f172a;
        --primary-cyan: #0891b2;
        --primary-green: #059669;
      }
      [data-theme="blue"] {
        --dark-bg: #011425;
        --card-bg: #1e293b;
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --border-color: #334155;
        --nav-bg: rgba(1, 20, 37, 0.95);
        --code-bg: #020d18;
        --terminal-bg: #020d18;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--dark-bg);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* ── NAV ── */
      nav {
        height: 58px;
        flex-shrink: 0;
        background: var(--nav-bg);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        gap: 1.5rem;
        z-index: 100;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 1.15rem;
        font-weight: 700;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .logo-icon {
        width: 45px;
        height: 45px;
        background: transparent;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: #fff;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
        flex: 1;
      }
      .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary-green);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-left: auto;
      }
      .server-badge {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.2rem 0.65rem;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        white-space: nowrap;
      }
      .server-badge.online {
        background: rgba(16, 185, 129, 0.12);
        color: var(--primary-green);
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .server-badge.offline {
        background: rgba(239, 68, 68, 0.12);
        color: var(--primary-red);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .theme-btn {
        background: var(--border-color);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        cursor: pointer;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .theme-btn:hover {
        border-color: var(--primary-green);
      }
      .theme-btn svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      /* ── MAIN LAYOUT ── */
      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: hidden;
        min-height: 0;
      }

      /* ── LEFT: TERMINAL ── */
      .terminal-panel {
        display: flex;
        flex-direction: column;
        border-right: 2px solid var(--border-color);
        background: var(--terminal-bg);
        min-height: 0;
        overflow: hidden;
      }
      .panel-bar {
        height: 42px;
        flex-shrink: 0;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 1rem;
        gap: 0.6rem;
      }
      .panel-label {
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .panel-bar-actions {
        margin-left: auto;
        display: flex;
        gap: 0.5rem;
      }
      .bar-btn {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }
      .bar-btn:hover {
        border-color: var(--primary-cyan);
        color: var(--primary-cyan);
      }

      /* ── TERMINAL BODY ── */
      #terminal {
        min-height: 0;
        flex: 1;
        overflow-y: auto;
        overflow-x: auto;
        padding: 1rem 1.2rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.84rem;
        line-height: 1.75;
        color: var(--text-primary);
        cursor: text;
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
      }
      #terminal::-webkit-scrollbar {
        width: 5px;
      }
      #terminal::-webkit-scrollbar-track {
        background: transparent;
      }
      #terminal::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 10px;
      }

      .t-system {
        color: var(--primary-cyan);
        opacity: 0.75;
        font-size: 0.76rem;
      }
      .t-prompt {
        color: var(--text-primary);
      }
      .t-input-line {
        color: var(--primary-green);
        font-weight: 600;
      }
      .t-output {
        color: var(--text-primary);
      }
      .t-success {
        color: var(--primary-green);
      }
      .t-error {
        color: var(--primary-red);
      }
      .t-warn {
        color: var(--primary-orange);
      }
      .t-compile {
        color: var(--primary-red);
        background: rgba(239, 68, 68, 0.06);
        padding: 0.3rem 0.6rem;
        border-radius: 6px;
        border-left: 3px solid var(--primary-red);
      }
      .t-dim {
        color: var(--text-secondary);
        font-size: 0.76rem;
      }
      /* Terminal line word wrap */
      #terminal > div {
        white-space: pre-wrap;
        word-break: break-all;
      }
      .input-row {
        white-space: normal;
      }

      /* ── INPUT ROW ── */
      .input-row {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 0.05rem 0;
      }
      .input-row .prompt-text {
        color: var(--text-primary);
        white-space: pre;
      }
      .input-row input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.84rem;
        color: var(--primary-green);
        caret-color: var(--primary-green);
        font-weight: 600;
        min-width: 80px;
      }
      [data-theme="light"] .input-row input {
        color: #059669;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .cursor-blink::after {
        content: "▌";
        animation: blink 1s step-start infinite;
        color: var(--primary-green);
        margin-left: 1px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        display: inline-block;
        width: 11px;
        height: 11px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--primary-cyan);
        border-radius: 50%;
        animation: spin 0.5s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      /* ── RIGHT: EDITOR ── */
      .editor-panel {
        display: flex;
        flex-direction: column;
        background: var(--dark-bg);
        min-height: 0;
        overflow: hidden;
      }
      .editor-toolbar {
        height: 42px;
        flex-shrink: 0;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 0.8rem;
        gap: 0.8rem;
      }
      .lang-tabs {
        display: flex;
        gap: 3px;
        background: var(--code-bg);
        padding: 3px;
        border-radius: 7px;
      }
      .lang-tab {
        padding: 0.28rem 0.75rem;
        border-radius: 5px;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        font-weight: 700;
        font-size: 0.74rem;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }
      .lang-tab.active {
        background: var(--primary-cyan);
        color: #fff;
      }
      .lang-tab:hover:not(.active) {
        background: rgba(6, 182, 212, 0.1);
        color: var(--primary-cyan);
      }

      .run-btn {
        margin-left: auto;
        background: linear-gradient(135deg, var(--primary-green), #059669);
        color: #fff;
        border: none;
        padding: 0.38rem 1.3rem;
        border-radius: 7px;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: "Inter", sans-serif;
      }
      .run-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
      }
      .run-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .cm-wrap {
        flex: 1;
        overflow: hidden;
        position: relative;
        min-height: 0;
      }
      .CodeMirror {
        height: 100% !important;
        font-size: 13.5px;
        font-family: "JetBrains Mono", monospace !important;
        line-height: 1.65 !important;
      }
      .CodeMirror-scroll {
        overflow-y: auto !important;
        overflow-x: auto !important;
      }

      /* ── STATUS BAR ── */
      .status-bar {
        height: 24px;
        flex-shrink: 0;
        background: var(--card-bg);
        border-top: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 1rem;
        gap: 1.5rem;
        font-size: 0.65rem;
        color: var(--text-secondary);
        font-family: "JetBrains Mono", monospace;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .status-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }

      @media (max-width: 800px) {
        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
        }
        .terminal-panel {
          border-right: none;
          border-bottom: 2px solid var(--border-color);
        }
      }
    </style>

    <div class="workspace">

    <link rel="stylesheet" href="css/navbar.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script>
      const SERVER = "http://localhost:3001/api/compiler";

      /* ═══════════════════════════════════════════════════════
   STARTER CODE TEMPLATES
   NOTE: JavaScript uses process.stdin via readline — cross-platform.
         No more /dev/stdin which breaks on Windows.
═══════════════════════════════════════════════════════ */
      const STARTERS = {
        cpp: `#include <iostream>
using namespace std;

int main() {
    int n;
    cout << "Enter a number: ";
    cin >> n;
    cout << "You entered: " << n << endl;
    cout << "Square: " << n * n << endl;
    return 0;
}`,
        c: `#include <stdio.h>

int main() {
    int n;
    printf("Enter a number: ");
    scanf("%d", &n);
    printf("You entered: %d\\n", n);
    printf("Square: %d\\n", n * n);
    return 0;
}`,
        python: `n = int(input("Enter a number: "))
print(f"You entered: {n}")
print(f"Square: {n * n}")`,
        java: `import java.util.Scanner;

public class Solution {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.print("Enter a number: ");
        int n = sc.nextInt();
        System.out.println("You entered: " + n);
        System.out.println("Square: " + (n * n));
    }
}`,
        // ── FIXED: cross-platform readline instead of /dev/stdin ──
        javascript: `const readline = require('readline');
const rl = readline.createInterface({ input: process.stdin });
const lines = [];

rl.on('line', line => lines.push(line));
rl.on('close', () => {
  let idx = 0;
  const input = () => lines[idx++];

  const n = parseInt(input());
  console.log("You entered: " + n);
  console.log("Square: " + (n * n));
});`,
      };

      const LANG_MODES = {
        cpp: "text/x-c++src",
        c: "text/x-csrc",
        python: "text/x-python",
        java: "text/x-java",
        javascript: "text/javascript",
      };

      /* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
      let currentLang = "cpp";
      let editor = null;
      let isRunning = false;
      let collectedInputs = [];
      let activeInputEl = null;

      /* ═══════════════════════════════════════════════════════
   TERMINAL HELPERS
═══════════════════════════════════════════════════════ */
      const term = () => document.getElementById("terminal");

      function tLine(html, cls = "") {
        const div = document.createElement("div");
        if (cls) div.className = cls;
        div.innerHTML = html;
        term().appendChild(div);
        scrollTerm();
      }

      function scrollTerm() {
        const t = term();
        t.scrollTop = t.scrollHeight;
      }

      function clearTerminal() {
        term().innerHTML = "";
        collectedInputs = [];
        activeInputEl = null;
      }

      function focusActiveInput() {
        if (activeInputEl) activeInputEl.focus();
      }

      /* ═══════════════════════════════════════════════════════
   INTERACTIVE INPUT ROW
═══════════════════════════════════════════════════════ */
      function askUser(promptText) {
        return new Promise((resolve) => {
          const row = document.createElement("div");
          row.className = "input-row";

          const span = document.createElement("span");
          span.className = "prompt-text";
          span.textContent = promptText;
          row.appendChild(span);

          const inp = document.createElement("input");
          inp.type = "text";
          inp.autocomplete = "off";
          inp.spellcheck = false;
          inp.setAttribute("autocorrect", "off");
          row.appendChild(inp);

          term().appendChild(row);
          scrollTerm();

          activeInputEl = inp;
          inp.focus();

          inp.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              const val = inp.value;
              row.remove();
              // Show the prompt + typed value as a frozen line
              tLine(
                escHtml(promptText) +
                  '<span class="t-input-line">' +
                  escHtml(val) +
                  "</span>",
                "t-prompt",
              );
              activeInputEl = null;
              resolve(val);
            }
          });
        });
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /* ═══════════════════════════════════════════════════════
   RUN PROGRAM
   Flow:
     1. /analyze  → get prompts array
     2. Ask user interactively for each prompt
     3. /execute  → run with all stdin joined
     4. renderOutput → show result
═══════════════════════════════════════════════════════ */
      async function runProgram() {
        if (isRunning) return;

        const code = editor.getValue().trim();
        if (!code) {
          tLine("⚠ No code to run.", "t-warn");
          return;
        }

        const online = await checkServer(false);
        if (!online) {
          tLine(
            "❌ Server offline. Start it with: <b>node server.js</b>",
            "t-error",
          );
          return;
        }

        setRunning(true);
        collectedInputs = [];

        tLine("─".repeat(48), "t-dim");
        tLine(
          `<span class="spinner"></span>Analyzing <b>${currentLang.toUpperCase()}</b>...`,
          "t-system",
        );

        /* STEP 1 — Analyze */
        let prompts = [];
        try {
          const ar = await fetch(`${SERVER}/analyze`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("token")}`, // THE FIX
            },
            body: JSON.stringify({ code, language: currentLang }),
          });
          const ad = await ar.json();
          prompts = ad.prompts || [];
        } catch (e) {
          prompts = [];
        }

        // Remove the "Analyzing..." line
        const t = term();
        if (t.lastChild) t.removeChild(t.lastChild);

        /* STEP 2 — Collect inputs interactively */
        if (prompts.length > 0) {
          tLine("▶ Program started — enter inputs below:", "t-system");

          for (let i = 0; i < prompts.length; i++) {
            if (!isRunning) return; // killed
            const userVal = await askUser(prompts[i]);
            collectedInputs.push(userVal);
          }
          tLine("", "");
        } else {
          tLine(`▶ Running <b>${currentLang.toUpperCase()}</b>...`, "t-system");
        }

        setStatus("Running...");

        /* STEP 3 — Execute */
        const stdin = collectedInputs.join("\n");
        let data;
        try {
          const resp = await fetch(`${SERVER}/execute`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("token")}`, // THE FIX
            },
            body: JSON.stringify({ code, language: currentLang, stdin }),
          });
          data = await resp.json();
        } catch (e) {
          tLine("❌ Network error: " + e.message, "t-error");
          setRunning(false);
          return;
        }

        /* STEP 4 — Render */
        renderOutput(data);
        setRunning(false);
      }

      /* ═══════════════════════════════════════════════════════
   RENDER OUTPUT
   ──────────────────────────────────────────────────────
   KEY FIX: Python, Java, JS do NOT echo stdin back in
   stdout when stdin is a pipe. Only C/C++ with cout/printf
   before cin/scanf produces output that contains both the
   prompt AND looks like it echoed the value.

   Strategy:
   • We already showed prompts + user values interactively.
   • The server stdout may contain:
       - For C/C++: "Enter a number: " + "5\n" + "Square: 25\n"
         (the prompt is in stdout, and the typed "5" is echoed)
       - For Python/Java/JS: "You entered: 5\nSquare: 25\n"
         (only result lines — NO echo, NO prompt repeated)

   So for C/C++ we strip prompt+echo lines; for others
   we just show everything as-is (already shown prompts).
═══════════════════════════════════════════════════════ */
      function renderOutput(data) {
        if (data.compile_error) {
          tLine("── Compilation Error ──", "t-warn");
          data.compile_error.split("\n").forEach((l) => {
            if (l.trim()) tLine(escHtml(l), "t-compile");
          });
          tLine("");
          setStatus("Compile Error");
          return;
        }

        const rawOut = (data.stdout || "")
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n");

        if (collectedInputs.length === 0) {
          // No inputs — show everything
          if (rawOut.trim()) {
            rawOut
              .split("\n")
              .forEach((line) => tLine(escHtml(line), "t-output"));
          }
        } else {
          // ── For C/C++: stdout includes prompt text + echoed input ──
          // ── For Python/Java/JS: stdout is clean result only ──
          //
          // We detect which case we're in by checking if any of the
          // typed input values appear literally in stdout.
          // If they do, strip them out (C/C++ style).
          // If they don't, show stdout as-is (Python/Java/JS style).

          const inputsAppearsInOutput = collectedInputs.some(
            (v) => v !== "" && rawOut.includes(v),
          );

          let resultPart = rawOut;

          if (inputsAppearsInOutput) {
            // C/C++ style: walk through stdout, skip past prompt+echo pairs
            let pos = 0;
            let ok = true;
            for (const val of collectedInputs) {
              if (!ok) break;
              const idx = rawOut.indexOf(val, pos);
              if (idx === -1) {
                ok = false;
                break;
              }
              pos = idx + val.length;
              if (rawOut[pos] === "\n") pos++;
              else if (rawOut[pos] === "\r" && rawOut[pos + 1] === "\n")
                pos += 2;
            }
            resultPart = ok ? rawOut.slice(pos) : rawOut;
          }
          // else: Python/Java/JS — use full rawOut as result

          if (resultPart.trim()) {
            tLine("── Output ──", "t-dim");
            resultPart.split("\n").forEach((line) => {
              if (line !== "") tLine(escHtml(line), "t-output");
            });
          } else if (!data.stderr) {
            tLine("(Program produced no output)", "t-dim");
          }
        }

        if (data.stderr && data.stderr.trim()) {
          tLine("── Runtime Error ──", "t-warn");
          data.stderr.split("\n").forEach((l) => {
            if (l.trim()) tLine(escHtml(l), "t-error");
          });
        }

        if (!rawOut.trim() && !data.stderr?.trim() && !data.compile_error) {
          tLine("(Program exited with no output)", "t-dim");
        }

        const ok2 = data.exitCode === 0;
        tLine(
          `<span style="color:${ok2 ? "#10b981" : "#ef4444"};font-size:.72rem;">── Exited with code ${data.exitCode} ──</span>`,
          "",
        );
        tLine("");
        setStatus(ok2 ? "Done ✓" : `Exit ${data.exitCode}`);
      }

      /* ═══════════════════════════════════════════════════════
   KILL / STOP
═══════════════════════════════════════════════════════ */
      function killProgram() {
        if (isRunning) {
          isRunning = false;
          document.querySelectorAll(".input-row").forEach((r) => r.remove());
          activeInputEl = null;
          tLine("⛔ Program killed.", "t-warn");
          setRunning(false);
        } else {
          clearTerminal();
        }
      }

      /* ═══════════════════════════════════════════════════════
   UI STATE
═══════════════════════════════════════════════════════ */
      function setRunning(state) {
        isRunning = state;
        const btn = document.getElementById("runBtn");
        btn.disabled = state;
        btn.innerHTML = state
          ? '<span class="spinner"></span>Running'
          : "▶ Run";
        if (!state) setStatus("Ready");
      }

      function setStatus(msg) {
        document.getElementById("sb-state").textContent = msg;
      }

      /* ═══════════════════════════════════════════════════════
   SERVER HEALTH CHECK
═══════════════════════════════════════════════════════ */
      async function checkServer(log = true) {
        try {
          const r = await fetch(`${SERVER}/health`, {
            signal: AbortSignal.timeout(2500),
          });
          const ok = r.ok;
          const badge = document.getElementById("serverBadge");
          badge.className = "server-badge " + (ok ? "online" : "offline");
          document.getElementById("serverText").textContent = ok
            ? "Server Online"
            : "Server Offline";
          return ok;
        } catch (e) {
          document.getElementById("serverBadge").className =
            "server-badge offline";
          document.getElementById("serverText").textContent = "Server Offline";
          return false;
        }
      }

      /* ═══════════════════════════════════════════════════════
   LANGUAGE SWITCHING
═══════════════════════════════════════════════════════ */
      document.querySelectorAll(".lang-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          if (isRunning) return;
          document
            .querySelectorAll(".lang-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentLang = tab.dataset.lang;
          editor.setOption("mode", LANG_MODES[currentLang]);
          editor.setValue(STARTERS[currentLang] || "");
          document.getElementById("sb-lang").innerHTML =
            `<span class="status-dot" style="background:var(--primary-cyan);"></span>${currentLang.toUpperCase()}`;
          const t = localStorage.getItem("dsa-theme") || "dark";
          editor.setOption("theme", getCMTheme(t));
        });
      });

      /* ═══════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════ */
      const THEMES = ["dark", "light", "blue"];
      const THEME_ICONS = {
        dark: '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>',
        light: '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>',
        blue: '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>',
      };

      function getCMTheme(t) {
        return t === "light"
          ? "eclipse"
          : t === "blue"
            ? "nord"
            : "material-ocean";
      }

      function applyTheme(t) {
        document.body.setAttribute("data-theme", t);
        document.getElementById("themeIcon").innerHTML = THEME_ICONS[t];
        localStorage.setItem("dsa-theme", t);
        if (editor) editor.setOption("theme", getCMTheme(t));
      }

      document.getElementById("themeToggle").addEventListener("click", () => {
        const cur = localStorage.getItem("dsa-theme") || "dark";
        applyTheme(THEMES[(THEMES.indexOf(cur) + 1) % 3]);
      });

      /* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
      window.onload = () => {
        const savedTheme = localStorage.getItem("dsa-theme") || "dark";

        editor = CodeMirror.fromTextArea(document.getElementById("codeArea"), {
          lineNumbers: true,
          theme: getCMTheme(savedTheme),
          mode: LANG_MODES[currentLang],
          indentUnit: 4,
          tabSize: 4,
          indentWithTabs: false,
          autoCloseBrackets: true,
          matchBrackets: true,
          lineWrapping: false,
          extraKeys: {
            "Ctrl-Enter": () => runProgram(),
            "Cmd-Enter": () => runProgram(),
            Tab: (cm) => cm.replaceSelection("    "),
          },
        });

        editor.setValue(STARTERS[currentLang]);
        applyTheme(savedTheme);

        editor.on("change", () => {
          document.getElementById("sb-lines").textContent =
            "Lines: " + editor.lineCount();
        });

        tLine("CODEANIME — Interactive Terminal", "t-system");
        tLine("Press ▶ Run or Ctrl+Enter to execute your code.", "t-dim");
        tLine("");

        checkServer(false);
        setInterval(() => checkServer(false), 8000);
      };
    </script>

    <script src="js/navbar.js"></script>
  </body>
</html>
