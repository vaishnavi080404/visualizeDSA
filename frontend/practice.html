<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CODEANIME — Practice</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-ocean.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/eclipse.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/nord.min.css"
    />
    <style>
      :root {
        --primary-green: #10b981;
        --primary-cyan: #06b6d4;
        --primary-purple: #8b5cf6;
        --primary-orange: #f59e0b;
        --primary-red: #ef4444;
        --dark-bg: #0a0a0a;
        --card-bg: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --border-color: #2a2a2a;
        --nav-bg: rgba(10, 10, 10, 0.9);
        --code-bg: #0d1117;
      }
      [data-theme="light"] {
        --dark-bg: #f8fafc;
        --card-bg: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border-color: #e2e8f0;
        --nav-bg: rgba(248, 250, 252, 0.9);
        --code-bg: #f1f5f9;
        --primary-cyan: #0891b2;
        --primary-green: #059669;
      }
      [data-theme="blue"] {
        --dark-bg: #011425;
        --card-bg: #1e293b;
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border-color: #242424;
        --nav-bg: rgba(1, 20, 37, 0.9);
        --code-bg: #011425;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--dark-bg);
        color: var(--text-primary);
        line-height: 1.6;
        transition:
          background 0.3s,
          color 0.3s;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        background: var(--nav-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        height: 60px;
        flex-shrink: 0;
      }
      .nav-container {
        max-width: 100%;
        padding: 0 1.5rem;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 1.2rem;
        font-weight: 700;
        text-decoration: none;
        color: inherit;
      }
      .logo-icon {
        width: 45px;
        height: 45px;
        background: transparent;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: #fff;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: color 0.3s;
      }
      .nav-links a:hover {
        color: var(--primary-green);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .theme-toggle {
        background: var(--border-color);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        cursor: pointer;
        width: 36px;
        height: 36px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }
      .theme-toggle:hover {
        border-color: var(--primary-green);
        background: rgba(16, 185, 129, 0.1);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }
      .top-bar {
        margin-top: 60px;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-color);
        padding: 0.6rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }
      .breadcrumb a {
        color: var(--text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--primary-cyan);
      }
      .breadcrumb .sep {
        opacity: 0.4;
      }
      .level-badge {
        padding: 0.3rem 1rem;
        background: linear-gradient(
          135deg,
          var(--primary-cyan),
          var(--primary-purple)
        );
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        color: #fff;
      }
      .app-layout {
        display: grid;
        grid-template-columns: 260px 1fr 1fr;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 60px - 42px);
        transition: grid-template-columns 0.3s ease;
      }
      .app-layout.sidebar-hidden {
        grid-template-columns: 0px 1fr 1fr;
      }
      .app-layout.sidebar-hidden .problem-sidebar {
        overflow: hidden;
        border-right: none;
      }
      .problem-sidebar {
        background: var(--card-bg);
        border-right: 1px solid var(--border-color);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
      }
      .problem-sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .problem-sidebar::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      .sidebar-header {
        padding: 1rem 1.2rem 0.8rem;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        background: var(--card-bg);
        z-index: 5;
      }
      .sidebar-header h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.6rem;
      }
      .filter-row {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 0.2rem 0.7rem;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-secondary);
        font-size: 0.72rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        border-color: var(--primary-cyan);
        color: var(--primary-cyan);
        background: rgba(6, 182, 212, 0.1);
      }
      .filter-btn.f-easy.active {
        border-color: var(--primary-green);
        color: var(--primary-green);
        background: rgba(16, 185, 129, 0.1);
      }
      .filter-btn.f-medium.active {
        border-color: var(--primary-orange);
        color: var(--primary-orange);
        background: rgba(245, 158, 11, 0.1);
      }
      .filter-btn.f-hard.active {
        border-color: var(--primary-red);
        color: var(--primary-red);
        background: rgba(239, 68, 68, 0.1);
      }
      .problem-list {
        padding: 0.5rem;
      }
      .prob-item {
        padding: 0.75rem 1rem;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
        margin-bottom: 0.3rem;
        display: flex;
        align-items: flex-start;
        gap: 0.7rem;
      }
      .prob-item:hover {
        background: rgba(6, 182, 212, 0.06);
        border-color: rgba(6, 182, 212, 0.2);
      }
      .prob-item.active {
        background: rgba(6, 182, 212, 0.1);
        border-color: var(--primary-cyan);
      }
      .prob-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--text-secondary);
        min-width: 22px;
        margin-top: 2px;
      }
      .prob-info {
        flex: 1;
        min-width: 0;
      }
      .prob-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 0.25rem;
      }
      .prob-meta {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .diff-badge {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.1rem 0.5rem;
        border-radius: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .diff-easy {
        background: rgba(16, 185, 129, 0.15);
        color: var(--primary-green);
      }
      .diff-medium {
        background: rgba(245, 158, 11, 0.15);
        color: var(--primary-orange);
      }
      .diff-hard {
        background: rgba(239, 68, 68, 0.15);
        color: var(--primary-red);
      }
      .prob-company {
        font-size: 0.62rem;
        color: var(--text-secondary);
        background: var(--code-bg);
        padding: 0.1rem 0.45rem;
        border-radius: 8px;
      }
      .prob-solved {
        color: var(--primary-green);
        font-size: 0.8rem;
        margin-top: 2px;
      }
      .problem-panel {
        border-right: 1px solid var(--border-color);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
        display: flex;
        flex-direction: column;
      }
      .problem-panel::-webkit-scrollbar {
        width: 4px;
      }
      .problem-panel::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      .problem-content {
        padding: 1.5rem;
        flex: 1;
      }
      .prob-header {
        margin-bottom: 1.5rem;
      }
      .prob-title-main {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 0.6rem;
        color: var(--text-primary);
      }
      .prob-tags-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .tag-pill {
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.25rem 0.7rem;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        background: var(--code-bg);
      }
      .tag-pill.tag-company {
        border-color: rgba(139, 92, 246, 0.4);
        color: var(--primary-purple);
        background: rgba(139, 92, 246, 0.08);
      }
      .tag-pill.tag-pattern {
        border-color: rgba(6, 182, 212, 0.4);
        color: var(--primary-cyan);
        background: rgba(6, 182, 212, 0.08);
      }
      .prob-stats {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .prob-stat {
        text-align: center;
      }
      .prob-stat-val {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--primary-cyan);
      }
      .prob-stat-lbl {
        font-size: 0.65rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .section-label {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--primary-cyan);
        margin-bottom: 0.6rem;
        margin-top: 1.4rem;
      }
      .prob-desc {
        color: var(--text-secondary);
        font-size: 0.92rem;
        line-height: 1.75;
        margin-bottom: 1.2rem;
      }
      .prob-desc strong {
        color: var(--text-primary);
      }
      .example-block {
        background: var(--code-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 1rem 1.2rem;
        margin-bottom: 0.8rem;
      }
      .example-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--primary-orange);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.6rem;
      }
      .example-io {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        line-height: 1.8;
      }
      .io-key {
        color: var(--text-secondary);
      }
      .io-val {
        color: var(--text-primary);
      }
      .example-explain {
        font-size: 0.82rem;
        color: var(--text-secondary);
        margin-top: 0.5rem;
        font-style: italic;
      }
      .constraints-box {
        background: var(--code-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 1rem 1.2rem;
        margin-top: 0.5rem;
      }
      .constraint-item {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        color: var(--text-secondary);
        padding: 0.2rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .constraint-item:last-child {
        border: none;
      }
      .approach-box {
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.08),
          rgba(6, 182, 212, 0.08)
        );
        border: 1px solid rgba(139, 92, 246, 0.25);
        border-radius: 12px;
        padding: 1.1rem 1.3rem;
        margin-top: 1rem;
      }
      .approach-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--primary-purple);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 0.6rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .approach-text {
        font-size: 0.85rem;
        color: var(--text-secondary);
        line-height: 1.7;
      }
      .approach-text code {
        font-family: "JetBrains Mono", monospace;
        color: var(--primary-cyan);
        background: rgba(6, 182, 212, 0.1);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
        font-size: 0.8rem;
      }
      .realworld-box {
        background: rgba(16, 185, 129, 0.06);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 10px;
        padding: 0.9rem 1.1rem;
        margin-top: 1rem;
        display: flex;
        gap: 0.8rem;
        align-items: flex-start;
      }
      .realworld-icon {
        font-size: 1.3rem;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .realworld-text {
        font-size: 0.85rem;
        color: var(--text-secondary);
        line-height: 1.6;
      }
      .realworld-text strong {
        color: var(--primary-green);
      }
      .editor-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--dark-bg);
      }
      .editor-topbar {
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-color);
        padding: 0.6rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .lang-tabs {
        display: flex;
        gap: 0.3rem;
        background: var(--code-bg);
        padding: 4px;
        border-radius: 8px;
      }
      .lang-tab {
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        font-weight: 600;
        font-size: 0.78rem;
        transition: all 0.2s;
      }
      .lang-tab.active {
        background: var(--primary-cyan);
        color: #000;
      }
      .editor-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .action-btn {
        padding: 0.4rem 1rem;
        border-radius: 7px;
        border: none;
        font-weight: 700;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .btn-hint {
        background: rgba(139, 92, 246, 0.15);
        color: var(--primary-purple);
        border: 1px solid rgba(139, 92, 246, 0.3);
      }
      .btn-hint:hover {
        background: rgba(139, 92, 246, 0.25);
      }
      .btn-solution {
        background: rgba(245, 158, 11, 0.15);
        color: var(--primary-orange);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .btn-solution:hover {
        background: rgba(245, 158, 11, 0.25);
      }
      .btn-run {
        background: linear-gradient(135deg, var(--primary-green), #059669);
        color: #fff;
        min-width: 90px;
      }
      .btn-run:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
      }
      .btn-run:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .btn-submit {
        background: linear-gradient(135deg, var(--primary-cyan), #0891b2);
        color: #fff;
      }
      .btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(6, 182, 212, 0.35);
      }
      .bottom-panel {
        background: var(--card-bg);
        border-top: 1px solid var(--border-color);
        flex-shrink: 0;
        max-height: 240px;
        display: flex;
        flex-direction: column;
      }
      .bottom-tabs {
        display: flex;
        border-bottom: 1px solid var(--border-color);
        background: var(--card-bg);
        flex-shrink: 0;
      }
      .bottom-tab {
        padding: 0.5rem 1.2rem;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .bottom-tab.active {
        color: var(--primary-cyan);
        border-bottom-color: var(--primary-cyan);
      }
      .bottom-content {
        flex: 1;
        overflow-y: auto;
        padding: 0.8rem 1rem;
      }
      .test-cases {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .test-case {
        background: var(--code-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.7rem 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem 1.5rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
      }
      .tc-label {
        font-size: 0.68rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.2rem;
      }
      .tc-val {
        color: var(--text-primary);
        font-weight: 600;
      }
      .tc-status {
        grid-column: 1/-1;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.78rem;
        margin-top: 0.2rem;
      }
      .tc-pass {
        color: var(--primary-green);
      }
      .tc-fail {
        color: var(--primary-red);
      }
      .tc-pending {
        color: var(--text-secondary);
      }
      .output-area {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        line-height: 1.75;
        color: var(--text-primary);
      }
      .out-line-success {
        color: var(--primary-green);
      }
      .out-line-error {
        color: var(--primary-red);
      }
      .out-line-info {
        color: var(--primary-cyan);
      }
      .out-line-warn {
        color: var(--primary-orange);
      }
      .sidebar-toggle-btn {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 48px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-left: none;
        border-radius: 0 6px 6px 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 0.7rem;
        z-index: 10;
        transition: all 0.2s;
      }
      .sidebar-toggle-btn:hover {
        background: var(--border-color);
        color: var(--primary-cyan);
      }
      .cm-wrapper {
        flex: 1;
        overflow: hidden;
        position: relative;
        min-height: 0;
      }
      .cm-wrapper .CodeMirror {
        height: 100% !important;
        font-size: 13.5px;
        font-family: "JetBrains Mono", monospace;
      }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .overlay-panel {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(6px);
        z-index: 50;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding-top: 2rem;
        overflow-y: auto;
      }
      .overlay-panel.show {
        display: flex;
      }
      .overlay-card {
        background: var(--card-bg);
        border-radius: 16px;
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        width: 90%;
        max-width: 560px;
        position: relative;
      }
      .overlay-card.hint-card {
        border-color: rgba(139, 92, 246, 0.4);
      }
      .overlay-card.sol-card {
        border-color: rgba(245, 158, 11, 0.4);
      }
      .overlay-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }
      .overlay-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: var(--border-color);
        border: none;
        color: var(--text-primary);
        width: 28px;
        height: 28px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .overlay-close:hover {
        background: var(--primary-red);
        color: #fff;
      }
      .result-banner {
        display: none;
        padding: 0.6rem 1.2rem;
        font-weight: 700;
        font-size: 0.85rem;
        text-align: center;
        flex-shrink: 0;
      }
      .result-banner.accepted {
        display: block;
        background: rgba(16, 185, 129, 0.15);
        color: var(--primary-green);
        border-top: 2px solid var(--primary-green);
      }
      .result-banner.wrong {
        display: block;
        background: rgba(239, 68, 68, 0.15);
        color: var(--primary-red);
        border-top: 2px solid var(--primary-red);
      }
      .result-banner.error {
        display: block;
        background: rgba(245, 158, 11, 0.15);
        color: var(--primary-orange);
        border-top: 2px solid var(--primary-orange);
      }
      .server-status {
        font-size: 0.7rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .server-status.online {
        background: rgba(16, 185, 129, 0.15);
        color: var(--primary-green);
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .server-status.offline {
        background: rgba(239, 68, 68, 0.15);
        color: var(--primary-red);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      /* Loading screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: var(--dark-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        flex-direction: column;
        gap: 1rem;
      }
      .loading-screen.hidden {
        display: none;
      }
      .loading-text {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      @media (max-width: 900px) {
        .app-layout {
          grid-template-columns: 1fr;
          height: auto;
          overflow: visible;
        }
        body {
          overflow: auto;
          height: auto;
        }
        .problem-sidebar {
          max-height: 200px;
          border-right: none;
          border-bottom: 1px solid var(--border-color);
        }
        .problem-panel {
          max-height: 50vh;
        }
        .editor-panel {
          min-height: 60vh;
        }
        .cm-wrapper .CodeMirror {
          height: 380px !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen shown until data file loads -->
    <div class="loading-screen" id="loadingScreen">
      <div
        class="spinner"
        style="width: 28px; height: 28px; border-width: 3px"
      ></div>
      <div class="loading-text" id="loadingText">Loading problems...</div>
    </div>

    <nav>
      <div class="nav-container">
        <a class="logo" href="index.html">
          <img src="dsa.gif" alt="Logo" class="logo-icon" />
          <span>CODEANIME</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="topics.html">Topics</a></li>
          <li><a href="prerequisite.html">Prerequisites</a></li>
          <li><a href="codeeditor.html">Code Editor</a></li>
        </ul>
        <div class="nav-right">
          <div class="server-status offline" id="serverStatus">
            <!-- <span class="status-dot"></span> -->
            <span id="serverStatusText">Server Offline</span>
          </div>
          <button class="theme-toggle" id="themeToggle">
            <svg viewBox="0 0 24 24" id="themeIcon">
              <path
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"
              />
            </svg>
          </button>
          <div id="nav-user-slot"></div>
        </div>
      </div>
    </nav>

    <div class="top-bar">
      <div class="breadcrumb">
        <a href="topics.html">Topics</a>
        <span class="sep">›</span>
        <a href="#" id="breadcrumbTopicLink">Topic</a>
        <span class="sep">›</span>
        <span>Level 3 — Problems</span>
      </div>
      <span class="level-badge" id="levelBadge">Problems</span>
    </div>

    <div class="app-layout" id="appLayout">
      <!-- COL 1: Problem List -->
      <div class="problem-sidebar">
        <div class="sidebar-header">
          <h3 id="sidebarTitle">Problems</h3>
          <div style="position: relative; margin-bottom: 0.6rem">
            <input
              id="searchInput"
              type="text"
              placeholder="🔍 Search problems..."
              oninput="searchProblems(this.value)"
              style="
                width: 100%;
                background: var(--code-bg);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 0.4rem 0.7rem 0.4rem 2rem;
                font-size: 0.78rem;
                color: var(--text-primary);
                outline: none;
                transition: border-color 0.2s;
              "
              onfocus="this.style.borderColor = 'var(--primary-cyan)'"
              onblur="this.style.borderColor = 'var(--border-color)'"
            />
            <span
              style="
                position: absolute;
                left: 0.6rem;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.75rem;
                opacity: 0.5;
              "
              >🔍</span
            >
          </div>
          <div class="filter-row">
            <button
              class="filter-btn active"
              onclick="filterProblems('all', this)"
            >
              All
            </button>
            <button
              class="filter-btn f-easy"
              onclick="filterProblems('Easy', this)"
            >
              Easy
            </button>
            <button
              class="filter-btn f-medium"
              onclick="filterProblems('Medium', this)"
            >
              Medium
            </button>
            <button
              class="filter-btn f-hard"
              onclick="filterProblems('Hard', this)"
            >
              Hard
            </button>
          </div>
        </div>

        <div class="problem-list" id="problemList"></div>
      </div>

      <!-- COL 2: Problem Description -->
      <div class="problem-panel" id="problemPanel" style="position: relative">
        <button
          class="sidebar-toggle-btn"
          id="sidebarToggle"
          onclick="toggleSidebar()"
          title="Toggle problem list"
        >
          ‹
        </button>
        <div class="problem-content" id="problemContent"></div>
      </div>

      <!-- COL 3: Code Editor -->
      <div class="editor-panel" id="editorPanel">
        <div class="overlay-panel" id="hintOverlay">
          <div class="overlay-card hint-card">
            <button class="overlay-close" onclick="closeOverlay('hintOverlay')">
              ✕
            </button>
            <div class="overlay-title" style="color: var(--primary-purple)">
              💡 Hint
            </div>
            <div
              id="hintContent"
              style="
                color: var(--text-secondary);
                font-size: 0.9rem;
                line-height: 1.75;
              "
            ></div>
          </div>
        </div>
        <div class="overlay-panel" id="solOverlay">
          <div class="overlay-card sol-card">
            <button class="overlay-close" onclick="closeOverlay('solOverlay')">
              ✕
            </button>
            <div class="overlay-title" style="color: var(--primary-orange)">
              📖 Solution
            </div>
            <div id="solContent"></div>
          </div>
        </div>
        <div class="editor-topbar">
          <div class="lang-tabs" id="langTabs">
            <button class="lang-tab active" data-lang="cpp">C++</button>
            <button class="lang-tab" data-lang="python">Python</button>
            <button class="lang-tab" data-lang="java">Java</button>
            <button class="lang-tab" data-lang="javascript">JS</button>
          </div>
          <div class="editor-actions">
            <button class="action-btn btn-hint" onclick="showHint()">
              💡 Hint
            </button>
            <button class="action-btn btn-solution" onclick="showSolution()">
              📖 Solution
            </button>
            <button class="action-btn btn-run" id="runBtn" onclick="runCode()">
              ▶ Run
            </button>
            <button
              class="action-btn btn-submit"
              id="submitBtn"
              onclick="submitCode()"
            >
              Submit
            </button>
          </div>
        </div>
        <div class="cm-wrapper" id="cmWrapper">
          <textarea id="codeEditor"></textarea>
        </div>
        <div class="result-banner" id="resultBanner"></div>
        <div class="bottom-panel">
          <div class="bottom-tabs">
            <button
              class="bottom-tab active"
              onclick="switchBottom('testcases', this)"
            >
              Test Cases
            </button>
            <button class="bottom-tab" onclick="switchBottom('output', this)">
              Output
            </button>
          </div>
          <div class="bottom-content">
            <div id="tab-testcases">
              <div class="test-cases" id="testCasesList"></div>
            </div>
            <div id="tab-output" style="display: none">
              <div class="output-area" id="outputArea">
                Click "Run" to execute your code...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <link rel="stylesheet" href="css/navbar.css" />
    <script src="js/navbar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>

    <script>
      /* ═══════════════════════════════════
   SERVER CONFIG
═══════════════════════════════════ */
      const SERVER_URL = "http://localhost:3001/api/compiler";
      /* ═══════════════════════════════════
   LOAD TOPIC DATA FROM URL PARAM
   Usage: practice.html?topic=stack
          practice.html?topic=array
          practice.html?topic=linkedlist
═══════════════════════════════════ */
      const urlParams = new URLSearchParams(window.location.search);
      const topicParam = urlParams.get("topic") || "stack";

      // Map topic names to their data files
      const TOPIC_FILES = {
        stack: "stack_problems.js",
        arrays: "array_problems.js",
        matrix: "matrix_problems.js",
        queue: "queue_problems.js",
        string: "string_problems.js",
        recursion: "recursion_problems.js",
        selectionsort: "selectionsort_problems.js",
        bubblesort: "bubblesort_problems.js",
        insertion_sort: "insertionsort_problems.js",
        merge_sort: "mergesort_problems.js",
        quick_sort: "quicksort_problems.js",
        linearsearch: "linearsearch_problems.js",
        binarysearch: "binarysearch_problems.js",
        linkedlist: "linkedlist_problems.js",
        "linked-list": "linkedlist_problems.js",
        trees: "tree_problems.js",
        hashing: "hashing_problems.js",
        heap: "heap_problems.js",
        graphs: "graphs_problems.js",
      };

      // Dynamically load the topic's data file
      function loadTopicData(topic) {
        return new Promise((resolve, reject) => {
          const file = TOPIC_FILES[topic];
          if (!file) {
            reject(new Error(`Unknown topic: ${topic}`));
            return;
          }
          const script = document.createElement("script");
          script.src = file;
          script.onload = () => {
            // After script loads, PROBLEMS and TOPIC_CONFIG are available globally
            if (
              typeof PROBLEMS !== "undefined" &&
              typeof TOPIC_CONFIG !== "undefined"
            ) {
              resolve({ problems: PROBLEMS, config: TOPIC_CONFIG });
            } else {
              reject(
                new Error(`Data file loaded but PROBLEMS not found in ${file}`),
              );
            }
          };
          script.onerror = () => reject(new Error(`Could not load: ${file}`));
          document.head.appendChild(script);
        });
      }

      /* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
      let problems = [];
      let topicConfig = {};
      let currentProblem = null;
      let currentLang = "cpp";
      let codeEditor;
      let solved = new Set();
      let currentFilter = "all";
      let serverOnline = false;
      const SOLVED_KEY = () => `${topicParam}_solved`;

      /* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
      document.addEventListener("DOMContentLoaded", async () => {
        // Init CodeMirror
        codeEditor = CodeMirror.fromTextArea(
          document.getElementById("codeEditor"),
          {
            lineNumbers: true,
            theme: "material-ocean",
            mode: "text/x-c++src",
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            autoCloseBrackets: true,
          },
        );
        const cmWrap = document.getElementById("cmWrapper");
        codeEditor.setSize("100%", cmWrap.offsetHeight + "px");

        // Apply saved theme
        const saved = localStorage.getItem("dsa-theme") || "dark";
        applyTheme(saved);

        // Load solved state for this topic
        solved = new Set(
          JSON.parse(localStorage.getItem(SOLVED_KEY()) || "[]"),
        );

        // Load topic data
        try {
          document.getElementById("loadingText").textContent =
            `Loading ${topicParam} problems...`;
          const { problems: p, config: c } = await loadTopicData(topicParam);
          problems = p;
          topicConfig = c;

          // Update page title and breadcrumb
          document.title = `${c.name} - Level 3 | CODEANIME`;
          document.getElementById("sidebarTitle").textContent =
            `${c.name} Problems`;
          document.getElementById("levelBadge").textContent =
            c.level || "Problems";
          const topicLink = document.getElementById("breadcrumbTopicLink");
          topicLink.textContent = c.name;
          topicLink.href = c.backLink || "topics.html";

          // Hide loading, show app
          document.getElementById("loadingScreen").classList.add("hidden");

          // Render
          renderProblemList();
          loadProblem(problems[0]);
          setTimeout(refreshCM, 100);
          checkServerStatus();
          setInterval(checkServerStatus, 10000);
        } catch (err) {
          document.getElementById("loadingText").textContent =
            `❌ ${err.message}`;
          console.error(err);
        }
      });

      /* ═══════════════════════════════════
   SERVER STATUS
═══════════════════════════════════ */
      async function checkServerStatus() {
        try {
          const res = await fetch(`${SERVER_URL}/health`, {
            signal: AbortSignal.timeout(3000),
          });
          const data = await res.json();
          serverOnline = true;
          const badge = document.getElementById("serverStatus");
          const text = document.getElementById("serverStatusText");
          badge.className = "server-status online";
          const available = Object.entries(data.languages)
            .filter(([, v]) => v)
            .map(([k]) => k.toUpperCase())
            .join(" · ");
          text.textContent = `Server Online · ${available}`;
        } catch (e) {
          serverOnline = false;
          document.getElementById("serverStatus").className =
            "server-status offline";
          document.getElementById("serverStatusText").textContent =
            "Server Offline";
        }
      }

      /* ═══════════════════════════════════
   THEME
═══════════════════════════════════ */
      const themes = ["dark", "light", "blue"];
      const themeIcons = {
        dark: '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>',
        light: '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>',
        blue: '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>',
      };
      function applyTheme(t) {
        document.body.setAttribute("data-theme", t);
        document.getElementById("themeIcon").innerHTML = themeIcons[t];
        localStorage.setItem("dsa-theme", t);
        if (codeEditor)
          codeEditor.setOption(
            "theme",
            t === "light"
              ? "eclipse"
              : t === "blue"
                ? "nord"
                : "material-ocean",
          );
      }
      document.getElementById("themeToggle").addEventListener("click", () => {
        const cur = localStorage.getItem("dsa-theme") || "dark";
        applyTheme(themes[(themes.indexOf(cur) + 1) % 3]);
      });

      /* ═══════════════════════════════════
   PROBLEM LIST
═══════════════════════════════════ */
      function renderProblemList() {
        const list = document.getElementById("problemList");
        list.innerHTML = "";
        const toShow = problems
          .filter(
            (p) => currentFilter === "all" || p.difficulty === currentFilter,
          )
          .filter((p) => {
            if (!currentSearch) return true;
            return (
              p.title.toLowerCase().includes(currentSearch) ||
              p.difficulty.toLowerCase().includes(currentSearch) ||
              p.pattern.toLowerCase().includes(currentSearch) ||
              p.companies.some((c) => c.toLowerCase().includes(currentSearch))
            );
          });
        toShow.forEach((p) => {
          const item = document.createElement("div");
          item.className =
            "prob-item" +
            (currentProblem && p.id === currentProblem.id ? " active" : "");
          item.onclick = () => loadProblem(p);
          item.innerHTML = `
      <div class="prob-num">${p.id}.</div>
      <div class="prob-info">
        <div class="prob-title">${p.title}</div>
        <div class="prob-meta">
          <span class="diff-badge diff-${p.difficulty.toLowerCase()}">${p.difficulty}</span>
          ${p.companies
            .slice(0, 2)
            .map((c) => `<span class="prob-company">${c}</span>`)
            .join("")}
        </div>
      </div>
      ${solved.has(p.id) ? '<div class="prob-solved">✓</div>' : ""}
    `;
          list.appendChild(item);
        });
      }

      function filterProblems(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderProblemList();
      }
      let currentSearch = "";

      function searchProblems(query) {
        currentSearch = query.toLowerCase().trim();
        renderProblemList();
      }

      /* ═══════════════════════════════════
   LOAD PROBLEM
═══════════════════════════════════ */
      function loadProblem(p) {
        currentProblem = p;
        renderProblemList();
        renderProblemContent(p);
        loadCode(currentLang);
        renderTestCases(p);
        clearResult();
        closeOverlay("hintOverlay");
        closeOverlay("solOverlay");
      }

      function renderProblemContent(p) {
        document.getElementById("problemContent").innerHTML = `
    <div class="prob-header">
      <div class="prob-title-main">${p.id}. ${p.title}</div>
      <div class="prob-tags-row">
        <span class="diff-badge diff-${p.difficulty.toLowerCase()}" style="font-size:.8rem;padding:.3rem .9rem">${p.difficulty}</span>
        ${p.companies.map((c) => `<span class="tag-pill tag-company">${c}</span>`).join("")}
        <span class="tag-pill tag-pattern">${p.pattern}</span>
      </div>
      <div class="prob-stats">
        <div class="prob-stat"><div class="prob-stat-val">${p.accuracy}</div><div class="prob-stat-lbl">Accuracy</div></div>

      </div>
    </div>
    <div class="section-label">Problem Statement</div>
    <div class="prob-desc">${p.description}</div>
    <div class="section-label">Examples</div>
    ${p.examples
      .map(
        (ex, i) => `
      <div class="example-block">
        <div class="example-label">Example ${i + 1}</div>
        <div class="example-io">
          <div><span class="io-key">Input: </span><span class="io-val">${ex.input}</span></div>
          <div><span class="io-key">Output: </span><span class="io-val">${ex.output}</span></div>
        </div>
        ${ex.explain ? `<div class="example-explain">💬 ${ex.explain}</div>` : ""}
      </div>
    `,
      )
      .join("")}
    <div class="section-label">Constraints</div>
    <div class="constraints-box">
      ${p.constraints.map((c) => `<div class="constraint-item">• ${c}</div>`).join("")}
    </div>
    <div class="approach-box" style="margin-top:1.2rem">
      <div class="approach-title">🧩 Approach Pattern</div>
      <div class="approach-text">This problem uses the <strong style="color:var(--primary-cyan)">${p.pattern}</strong> pattern.</div>
    </div>
    <div class="realworld-box">
      <div class="realworld-icon">🌍</div>
      <div class="realworld-text"><strong>Real World:</strong> ${p.realWorld}</div>
    </div>
  `;
      }

      /* ═══════════════════════════════════
   CODE EDITOR
═══════════════════════════════════ */
      const modeMap = {
        cpp: "text/x-c++src",
        python: "text/x-python",
        java: "text/x-java",
        javascript: "text/javascript",
      };

      document.querySelectorAll(".lang-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".lang-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentLang = tab.dataset.lang;
          loadCode(currentLang);
        });
      });

      function loadCode(lang) {
        const code =
          currentProblem.starterCode[lang] ||
          `// No starter code for ${lang} yet`;
        codeEditor.setOption("mode", modeMap[lang]);
        codeEditor.setValue(code);
        clearResult();
      }

      /* ═══════════════════════════════════
   TEST CASES
═══════════════════════════════════ */
      function renderTestCases(p, results) {
        const el = document.getElementById("testCasesList");
        el.innerHTML = "";
        p.testCases.forEach((tc, i) => {
          const r = results ? results[i] : null;
          let statusHtml = '<span class="tc-pending">○ Not run</span>';
          if (r === "pass")
            statusHtml = '<span class="tc-pass">✓ Passed</span>';
          if (r === "fail")
            statusHtml = '<span class="tc-fail">✗ Failed</span>';
          if (r === "error")
            statusHtml = '<span class="tc-fail">⚠ Error</span>';
          el.innerHTML += `
      <div class="test-case">
        <div><div class="tc-label">Input</div><div class="tc-val">${tc.input}</div></div>
        <div><div class="tc-label">Expected</div><div class="tc-val">${tc.expected}</div></div>
        <div class="tc-status">${statusHtml}</div>
      </div>
    `;
        });
      }

      function switchBottom(tab, btn) {
        document
          .querySelectorAll(".bottom-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-testcases").style.display =
          tab === "testcases" ? "" : "none";
        document.getElementById("tab-output").style.display =
          tab === "output" ? "" : "none";
      }

      /* ═══════════════════════════════════
   JS IN-BROWSER FALLBACK
═══════════════════════════════════ */
      function runJSInBrowser(userCode, jsTestCall, input) {
        const cleanCode = userCode
          .split("\n")
          .filter((l) => {
            const t = l.trim();
            return (
              !t.includes("require('fs')") &&
              !t.includes("readFileSync") &&
              !t.includes("process.stdin") &&
              !t.startsWith("const s =") &&
              !t.startsWith("console.log(")
            );
          })
          .join("\n");
        const callExpr = jsTestCall.replace("__INPUT__", JSON.stringify(input));
        try {
          const result = new Function(`${cleanCode}\nreturn (${callExpr});`)();
          return { got: String(result ?? "").trim(), errored: false };
        } catch (e) {
          return { got: e.message, errored: true };
        }
      }

      /* ═══════════════════════════════════
   RUN CODE
═══════════════════════════════════ */
      async function runCode() {
        const btn = document.getElementById("runBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Running';
        clearResult();
        switchBottom("output", document.querySelectorAll(".bottom-tab")[1]);

        const outputEl = document.getElementById("outputArea");
        const userCode = codeEditor.getValue().trim();
        const results = [];

        if (
          !userCode ||
          userCode === (currentProblem.starterCode[currentLang] || "").trim()
        ) {
          outputEl.innerHTML = `<span class="out-line-warn">⚠ Write your solution first, then click Run.</span>`;
          btn.disabled = false;
          btn.innerHTML = "▶ Run";
          return;
        }

        // Server offline fallback
        if (!serverOnline) {
          if (currentLang === "javascript") {
            outputEl.innerHTML = `<span class="out-line-warn">⚠ Server offline — running JS in browser</span><br>`;
            let allPass = true;
            for (let i = 0; i < currentProblem.testCases.length; i++) {
              const tc = currentProblem.testCases[i];
              const { got, errored } = runJSInBrowser(
                userCode,
                currentProblem.jsTestCall,
                tc.input,
              );
              const pass = !errored && got === tc.expected.trim();
              results.push(errored ? "error" : pass ? "pass" : "fail");
              if (!pass) allPass = false;
              outputEl.innerHTML += errored
                ? `<span class="out-line-error">Test ${i + 1}: ✗ Error — ${escHtml(got)}</span><br>`
                : `<span class="${pass ? "out-line-success" : "out-line-error"}">Test ${i + 1}: ${pass ? "✓ PASS" : `✗ FAIL  got <b>"${escHtml(got)}"</b>  expected <b>"${tc.expected}"</b>`}</span><br>`;
            }
            showResult(allPass ? "accepted" : "wrong");
            if (allPass) markSolved(currentProblem.id);
          } else {
            outputEl.innerHTML = `
        <span class="out-line-error">❌ Server offline. Cannot run ${currentLang.toUpperCase()} code.</span><br><br>
        <span class="out-line-warn">Start server:</span><br>
        <span class="out-line-info">&nbsp;&nbsp;cd your-project-folder</span><br>
        <span class="out-line-info">&nbsp;&nbsp;node server.js</span><br><br>
        <span class="out-line-warn">💡 Switch to JS tab to run without server.</span>
      `;
            showResult("error");
          }
          renderTestCases(currentProblem, results);
          btn.disabled = false;
          btn.innerHTML = "▶ Run";
          return;
        }

        outputEl.innerHTML = `<span class="out-line-info">⚡ Executing...</span><br>`;

        try {
          let allPass = true;
          for (let i = 0; i < currentProblem.testCases.length; i++) {
            const tc = currentProblem.testCases[i];
            let data;
            try {
              const resp = await fetch(`${SERVER_URL}/execute`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${localStorage.getItem("token")}`, // THE FIX
                },
                body: JSON.stringify({
                  code: userCode,
                  language: currentLang,
                  stdin: tc.input,
                }),
              });
              data = await resp.json();
            } catch (fetchErr) {
              serverOnline = false;
              outputEl.innerHTML = `<span class="out-line-error">❌ Lost connection to server.</span>`;
              showResult("error");
              btn.disabled = false;
              btn.innerHTML = "▶ Run";
              return;
            }

            const stdout = (data.stdout || "").trim();
            const stderr = (data.stderr || "").trim();
            const compErr = (data.compile_output || "").trim();
            const exitCode = data.exitCode ?? 0;

            if (i === 0) outputEl.innerHTML = "";

            if (compErr) {
              const cleaned = compErr
                .replace(/\/tmp\/[^\s:]+:/g, "")
                .trim()
                .slice(0, 600);
              outputEl.innerHTML =
                `<span class="out-line-error">❌ Compilation Error</span><br><br>` +
                `<pre style="color:var(--primary-red);white-space:pre-wrap;font-size:.78rem;line-height:1.6">${escHtml(cleaned)}</pre>`;
              results.push("error");
              showResult("error");
              renderTestCases(currentProblem, results);
              btn.disabled = false;
              btn.innerHTML = "▶ Run";
              return;
            }

            if (exitCode !== 0 && !stdout) {
              results.push("error");
              allPass = false;
              const errMsg =
                stderr.slice(0, 300) || `Process exited with code ${exitCode}`;
              outputEl.innerHTML += `<span class="out-line-error">Test ${i + 1}: ✗ Runtime Error — ${escHtml(errMsg.split("\n")[0])}</span><br>`;
              if (stderr.includes("\n"))
                outputEl.innerHTML += `<pre style="color:var(--primary-red);white-space:pre-wrap;font-size:.75rem;line-height:1.5;margin-left:1rem">${escHtml(stderr.slice(0, 300))}</pre>`;
              continue;
            }

            const normalize = (s) => s.replace(/\s+/g, " ").trim();
            const pass = normalize(stdout) === normalize(tc.expected);
            results.push(pass ? "pass" : "fail");
            if (!pass) allPass = false;
            outputEl.innerHTML += `<span class="${pass ? "out-line-success" : "out-line-error"}">Test ${i + 1}: ${
              pass
                ? "✓ PASS"
                : `✗ FAIL  got <b>"${escHtml(stdout)}"</b>  expected <b>"${tc.expected}"</b>`
            }</span><br>`;
            if (stderr && !pass)
              outputEl.innerHTML += `<pre style="color:var(--primary-orange);white-space:pre-wrap;font-size:.73rem;line-height:1.5;margin-left:1rem;margin-bottom:.5rem">${escHtml(stderr.slice(0, 200))}</pre>`;
          }
          showResult(allPass ? "accepted" : "wrong");
          if (allPass) markSolved(currentProblem.id);
        } catch (e) {
          outputEl.innerHTML += `<span class="out-line-error">Unexpected error: ${escHtml(e.message)}</span>`;
          showResult("error");
        }

        renderTestCases(currentProblem, results);
        btn.disabled = false;
        btn.innerHTML = "▶ Run";
      }

      async function submitCode() {
        await runCode();
      }

      function showResult(type) {
        const banner = document.getElementById("resultBanner");
        banner.className = "result-banner " + type;
        if (type === "accepted")
          banner.innerHTML = "🎉 Accepted — All test cases passed!";
        else if (type === "wrong")
          banner.innerHTML = "✗ Wrong Answer — Some test cases failed.";
        else banner.innerHTML = "⚠ Error — Check your code.";
      }
      function clearResult() {
        document.getElementById("resultBanner").className = "result-banner";
      }
      function markSolved(id) {
        // 1. Mark the specific problem as solved for the sidebar UI
        solved.add(id);
        localStorage.setItem(SOLVED_KEY(), JSON.stringify([...solved]));
        renderProblemList();

        // 2. Map URL topic names to the IDs used in topics.html
        // This fixes the "arrays" vs "array" or "trees" vs "tree" issue
        const idMap = {
          // Sorting (Fixed Underscores)
          insertion_sort: "insertionsort",
          "insertion-sort": "insertionsort",
          insertionsort: "insertionsort",
          merge_sort: "mergesort",
          "merge-sort": "mergesort",
          mergesort: "mergesort",
          quick_sort: "quicksort",
          "quick-sort": "quicksort",
          quicksort: "quicksort",
          selection_sort: "selectionsort",
          "selection-sort": "selectionsort",
          selectionsort: "selectionsort",
          bubble_sort: "bubblesort",
          "bubble-sort": "bubblesort",
          bubblesort: "bubblesort",

          // Searching
          linear_search: "linearsearch",
          "linear-search": "linearsearch",
          linearsearch: "linearsearch",
          binary_search: "binarysearch",
          "binary-search": "binarysearch",
          binarysearch: "binarysearch",

          // Strings & Arrays
          string: "string",
          strings: "string",
          array: "array",
          arrays: "array",

          // Others
          "linked-list": "linkedlist",
          linkedlist: "linkedlist",
          trees: "tree",
          tree: "tree",
          graphs: "graphs",
          graph: "graphs",
        };

        const targetTopicId = idMap[topicParam] || topicParam;
        console.log(`Marking topic ${targetTopicId} as Level 3 complete...`);

        // 3. Update Local Progress
        const progress = JSON.parse(localStorage.getItem("progress") || "{}");

        // Always bump to 3 if they solved a problem
        progress[targetTopicId] = 3;
        localStorage.setItem("progress", JSON.stringify(progress));

        // 4. Force UI sync for the navbar/Topics page
        window.dispatchEvent(new Event("storage"));

        // 5. Sync to MongoDB
        fetch("http://localhost:3001/api/user/progress", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${localStorage.getItem("token")}`,
          },
          body: JSON.stringify({
            topicId: targetTopicId,
            level: 3,
          }),
        })
          .then((res) => res.json())
          .then((data) => console.log("Cloud Sync Success:", data))
          .catch((err) => console.error("Cloud Sync Error:", err));
      }

      function showHint() {
        document.getElementById("hintContent").innerHTML = currentProblem.hint;
        document.getElementById("hintOverlay").classList.add("show");
      }
      function showSolution() {
        const sol =
          currentProblem.solution[currentLang] ||
          currentProblem.solution["cpp"] ||
          "Not available.";
        document.getElementById("solContent").innerHTML = `
    <div style="background:var(--code-bg);border:1px solid var(--border-color);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.8rem">
      <div style="font-size:.72rem;color:var(--primary-orange);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem">${currentLang.toUpperCase()}</div>
      <pre style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-primary);white-space:pre-wrap;line-height:1.7">${escHtml(sol)}</pre>
    </div>
    <button onclick="applySolution()" style="background:var(--primary-orange);color:#000;border:none;padding:.5rem 1.2rem;border-radius:7px;font-weight:700;cursor:pointer;font-size:.82rem">📋 Copy to Editor</button>
  `;
        document.getElementById("solOverlay").classList.add("show");
      }
      function applySolution() {
        codeEditor.setValue(
          currentProblem.solution[currentLang] ||
            currentProblem.solution["cpp"] ||
            "",
        );
        closeOverlay("solOverlay");
      }
      function closeOverlay(id) {
        document.getElementById(id).classList.remove("show");
      }
      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      let sidebarVisible = true;
      function toggleSidebar() {
        sidebarVisible = !sidebarVisible;
        const layout = document.getElementById("appLayout");
        const btn = document.getElementById("sidebarToggle");
        layout.classList.toggle("sidebar-hidden", !sidebarVisible);
        btn.textContent = sidebarVisible ? "‹" : "›";
        setTimeout(refreshCM, 320);
      }
      function refreshCM() {
        const cmWrap = document.getElementById("cmWrapper");
        if (cmWrap && codeEditor) {
          codeEditor.setSize("100%", cmWrap.offsetHeight + "px");
          codeEditor.refresh();
        }
      }
      window.addEventListener("resize", refreshCM);
    </script>
  </body>
</html>
